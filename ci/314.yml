name: test
channels:
  - conda-forge
dependencies:
  - python=3.14
  - cxx-compiler  # platform-appropriate compiler w/ OpenMP
  - geopandas >=1.1
  - numpy >=2
  - pandas >=2
  - pytables >=3.1
  - scikit-learn >=0.18

  # plus
  - osmnx

  # dev
  - codecov
  - pytest
  - pytest-cov

  # docs
  - myst-parser
  - nbsphinx
  - numpydoc
  - sphinx
  - sphinxcontrib-bibtex
  - sphinx_bootstrap_theme
